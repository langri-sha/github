name: Check

on:
  workflow_call:
    inputs:
      beachball:
        description: Run Beachball checks.
        type: boolean
        default: false
      eslint:
        description: Run ESLint checks.
        type: boolean
        default: false
      prettier:
        description: Run Prettier checks.
        type: boolean
        default: false
      typescript:
        description: Run TypeScript checks.
        type: boolean
        default: false
      packages:
        description: Run package checks.
        type: boolean
        default: false
      projen:
        description: Run projen checks.
        type: boolean
        default: false
      vitest:
        description: Run Vitest checks.
        type: boolean
        default: false
    secrets:
      APP_ID:
        description: GitHub App ID used for the post-upgrade push.
        required: false
      APP_PRIVATE_KEY:
        description: GitHub App private key used for the post-upgrade push.
        required: false

jobs:
  post-upgrade:
    name: Renovate Post-Upgrade
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && (github.actor == 'renovate[bot]' || github.actor == 'dependabot[bot]')
    permissions:
      contents: read
    outputs:
      has-changes: ${{ steps.git-changes.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: langri-sha/github/actions/pnpm@v0.3.0

      - name: Apply ESLint fixes
        if: inputs.eslint
        run: pnpm eslint --fix .

      - name: Apply Prettier fixes
        if: inputs.prettier
        run: pnpm prettier --write .

      - name: Update Vitest snapshots
        if: inputs.vitest
        run: pnpm vitest --update --passWithNoTests

      - name: Apply projen changes
        if: inputs.projen
        run: pnpm projen

      - name: Stage generated changes
        if: inputs.beachball
        run: git add -A

      - name: Create Beachball changes
        if: inputs.beachball
        run: |
          pnpm beachball change \
            --message "${{ github.event.pull_request.title }}" \
            --no-commit \
            --type patch \
            --yes

      - name: Check Beachball changes
        if: inputs.beachball
        run: pnpm beachball check

      - name: Check for Git changes
        id: git-changes
        run: |
          if [[ `git status --porcelain | wc -c` -ne '0' ]]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create patch
        run: |
          git add -A
          git diff --cached > .diff.patch

      - name: Upload diff
        uses: actions/upload-artifact@v4
        if: ${{ steps.git-changes.outputs.has-changes }}
        with:
          include-hidden-files: true
          name: diff
          path: .diff.patch

  commit-upgrade-changes:
    name: Commit Upgrade Changes
    runs-on: ubuntu-latest
    if: needs.post-upgrade.outputs.has-changes == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && (github.actor == 'renovate[bot]' || github.actor == 'dependabot[bot]')
    needs: [post-upgrade]

    permissions:
      contents: write

    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Download diff
        uses: actions/download-artifact@v4
        with:
          name: diff

      - name: Reject unsafe paths in patch
        run: |
          git apply --check .diff.patch
          if git apply --numstat .diff.patch | awk -F '\t' '{print $3}' | grep -E '^\.github/(workflows|actions)/'; then
            echo '::error::Generated post-upgrade patches may not modify GitHub Actions files.'
            exit 1
          fi

      - name: Configure Git user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          BOT_NAME="${APP_SLUG}[bot]"
          BOT_ID=$(gh api "/users/${BOT_NAME}" -q .id)
          git config user.name  "${BOT_NAME}"
          git config user.email "${BOT_ID}+${BOT_NAME}@users.noreply.github.com"

      - name: Apply diff
        run: |
          git apply .diff.patch
          git add .
          git commit -m "chore(deps): Apply upgrade changes"
          git push origin ${{ github.event.pull_request.head.ref }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [commit-upgrade-changes]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false

      - name: Setup PNPM
        uses: langri-sha/github/actions/pnpm@v0.3.0

      - name: ESLint
        if: inputs.eslint
        run: pnpm eslint .

      - name: Prettier
        if: inputs.prettier
        run: pnpm prettier --check .

      - name: Beachball
        if: github.event_name == 'pull_request' && inputs.beachball
        run: |
          pnpm beachball check ||
          (
            echo "::error::Beachball changes detected. Run 'pnpm beachball change' and commit the changes.";
            exit 1
          )

      - name: Sort packages
        if: inputs.packages
        run: |
          pnpx sort-package-json@latest --check \
            ./apps/*/package.json \
            ./packages/*/package.json \
            package.json

      - name: Check packages
        if: inputs.packages
        run: |
          pnpm -r exec npm pkg fix

          if [[ $(git status --porcelain) ]]; then
            echo '::error::Some packages need fixing.'
            git status
            git diff
            exit 1
          fi

      - name: Check projen configuration
        if: inputs.projen
        run: |
          pnpm projen

          if [[ $(git status --porcelain) ]]; then
            echo '::error::Some projen changes haven not been appplied. Run `pnpm projen`.'
            git status
            git diff
            exit 1
          fi

      - name: TypeScript
        if: inputs.typescript
        run: pnpm tsc --build .

  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    needs: [commit-upgrade-changes]
    if: always() && inputs.vitest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: langri-sha/github/actions/pnpm@v0.3.0

      - name: Vitest
        run: pnpm vitest --passWithNoTests
