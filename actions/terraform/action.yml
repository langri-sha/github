name: Terraform
description: |-
  Checks the current Terraform configuration to ensure the dependencies,
  formatting and resources are all valid. Will use the preferred Terraform
  version, if configured in the sources.

  Runs in the current working directory.

inputs:
  working-directory:
    description: |-
      The working directory to use for reading the Terraform configuration.
      Defaults to the current working directory.
    required: false
  terraform-version:
    description: |-
      The Terraform version to install. When set, takes precedence over the
      version auto-detected from `required_version` in the working directory's
      *.tf files. Falls back to that auto-detection, then to `latest`.
    required: false

runs:
  using: composite

  steps:
    - name: Install ripgrep
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y ripgrep

    - name: Get version
      id: version
      shell: bash
      working-directory: ${{ inputs.working-directory || '.' }}
      run: |
        echo "terraform-version=$(rg "required_version = \"(\d+\.\d+\.\d+)\"" -t tf -or '$1' --no-filename | tail -1)" >> $GITHUB_OUTPUT

    - name: Warn missing version
      if: inputs.terraform-version == '' && steps.version.outputs.terraform-version == ''
      shell: bash
      run: |
        echo "::warning::Missing Terraform version"

    - name: Setup
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version || steps.version.outputs.terraform-version || 'latest' }}

    - name: Initialize
      shell: bash
      working-directory: ${{ inputs.working-directory || '.' }}
      run: terraform init -backend=false

    - name: Fail on lockfile changes
      shell: bash
      run: |
        if [[ $(git status --porcelain) ]]; then
          echo 'Terraform lockfile changed.'
          echo 'Did you remember to run `terraform init` and commit changes to `.terraform.lock.hcl`?'
          git diff
          exit 1
        fi

    - name: Format
      shell: bash
      working-directory: ${{ inputs.working-directory || '.' }}
      run: terraform fmt -recursive -check

    - name: Validate
      shell: bash
      working-directory: ${{ inputs.working-directory || '.' }}
      run: terraform validate
